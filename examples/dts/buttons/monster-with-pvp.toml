# Monster (pokemon) card in TOML form, demonstrating four button
# shapes plus the visible_to access model:
#
#   - "Show PVP details"     — visible_to: anyone (default). Inline
#                              JSON response, only attached when the
#                              encounter has PVP data (show_if gate).
#   - "Show map links"       — visible_to: registered. Address + deep
#                              links to Google/Apple/Waze maps. Hides
#                              precise location from random viewers
#                              while still being one click away for
#                              registered users.
#   - "Copy coordinates"     — visible_to: registered. Plain-text
#                              response with raw lat/lon for the user
#                              to paste into another tool.
#   - "Mute this species"    — action button. applies_to defaults to
#                              ["dm"] for mute actions, so it only
#                              attaches on DM destinations.
#
# Companion to fallbacks/dts.json's monster id=1 / monster-1-discord-en.json
# in the standard layout — same field names (ivColor, fullName, atk/def/sta,
# pvpGreat / pvpLittle / pvpUltra, pvpAvailable). The main card stays
# lean; sensitive info (address, coordinates) lives behind clicks so
# channel viewers only see the alert summary by default.

[[entry]]
id = "1"
type = "monster"
platform = "discord"
language = "en"
description = "Compact monster card with PVP, map, coord and mute buttons (TOML form)"

template = """
{
  "embed": {
    "title": "{{round iv}}% {{fullName}} cp:{{cp}} L:{{level}} {{atk}}/{{def}}/{{sta}} {{{boostWeatherEmoji}}}",
    "color": "{{ivColor}}",
    "thumbnail": { "url": "{{{imgUrl}}}" },
    "description": "End: {{time}} ({{tthm}}m {{tths}}s)\\nquick: {{quickMoveName}} · charge: {{chargeMoveName}}",
    "image": { "url": "{{{staticMap}}}" }
  }
}
"""

  # Inline response template — only attached when the encounter has
  # PVP data, via show_if = "{{pvpAvailable}}" evaluated against the
  # resolved view at render time.
  #
  # Body lines and the closing `"""` are at column 0 on purpose. TOML
  # triple-quoted strings preserve content literally, including any
  # whitespace before the closing fence — indenting either would
  # silently inject leading/trailing spaces into the parsed template.
  # The config editor's TOML writer emits in this canonical form for
  # the same reason; matching it here means a save round-trip leaves
  # the file unchanged.
  [[entry.buttons]]
  id = "pvp"
  label = "Show PVP details"
  style = "secondary"
  show_if = "{{pvpAvailable}}"
  response_template_inline = """
{
  "embed": {
    "title": "PVP rankings for {{fullName}}",
    "color": "{{ivColor}}",
    "fields": [
      {{#if pvpLittle}}
      {
        "name": "Little league",
        "value": "{{#each pvpLittle}}#{{rank}} {{fullName}} @{{cp}}CP (Lvl. {{levelWithCap}})\\n{{/each}}",
        "inline": false
      }{{#if pvpGreat}},{{/if}}{{#if pvpUltra}}{{#unless pvpGreat}},{{/unless}}{{/if}}
      {{/if}}
      {{#if pvpGreat}}
      {
        "name": "Great league",
        "value": "{{#each pvpGreat}}#{{rank}} {{fullName}} @{{cp}}CP (Lvl. {{levelWithCap}})\\n{{/each}}",
        "inline": false
      }{{#if pvpUltra}},{{/if}}
      {{/if}}
      {{#if pvpUltra}}
      {
        "name": "Ultra league",
        "value": "{{#each pvpUltra}}#{{rank}} {{fullName}} @{{cp}}CP (Lvl. {{levelWithCap}})\\n{{/each}}",
        "inline": false
      }
      {{/if}}
    ]
  }
}
"""

  # Map links — pulled out of the main card so channel viewers don't
  # see exact coordinates by default. visible_to: registered means
  # only users with a Poracle account (humans-table row) get past the
  # click-time gate. On channel destinations every viewer sees the
  # button; the gate fires server-side after they click. (On DMs the
  # recipient is registered by definition, so the gate never blocks
  # there.)
  [[entry.buttons]]
  id = "location"
  label = "Show map links"
  style = "primary"
  visible_to = "registered"
  response_template_inline = """
{
  "embed": {
    "title": "Location",
    "description": "{{{addr}}}\\n[Google]({{{googleMapUrl}}}) · [Apple]({{{appleMapUrl}}}) · [Waze]({{{wazeMapUrl}}})"
  }
}
"""

  # Plain-text response — handy one-liner. Single-line response_text
  # skips JSON parsing entirely; the Handlebars output goes straight
  # to Discord as message content. Also visible_to: registered since
  # raw coordinates are sensitive in the same way map links are.
  [[entry.buttons]]
  id = "coords"
  label = "Copy coordinates"
  style = "secondary"
  visible_to = "registered"
  response_text = "📍 `{{latitude}}, {{longitude}}`"

  # Action button — mute scope=pokemon uses pokemon_id from the
  # snapshot view. applies_to defaults to ["dm"] for mute actions,
  # so the button won't appear on channel sends.
  [[entry.buttons]]
  id = "mute_species_1h"
  label = "Mute this species (1h)"
  style = "danger"
  action = "mute"
  scope = "pokemon"
  params = { duration_min = 60 }
