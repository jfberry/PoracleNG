# -----------------------------------------------------------------------------
# /track — pokemon is required; all other options optional
# -----------------------------------------------------------------------------
- name: track-pokemon-only
  description: Minimum-viable /track invocation
  command: cmd.track
  slash:
    name: track
    options:
      pokemon: pikachu
  text: "!track pikachu"
  expected_tokens: [pikachu]

- name: track-pokemon-iv
  description: /track with iv filter
  command: cmd.track
  slash:
    name: track
    options:
      pokemon: pikachu
      iv: "95"
  text: "!track pikachu iv95"
  expected_tokens: [pikachu, iv95]

- name: track-all-options
  description: /track exercising every option to keep coverage honest
  command: cmd.track
  slash:
    name: track
    options:
      pokemon: "25"
      iv: "100"
      distance: 250
      great_rank: 5
      ultra_rank: 10
      little_rank: 7
      clean: true
      template: pvp
      form: alola
      size: xl
  text: "!track 25 iv100 great5 ultra10 little7 d250 clean template:pvp form:alola xl"
  expected_tokens: ["25", iv100, great5, ultra10, little7, d250, clean, "template:pvp", "form:alola", xl]

