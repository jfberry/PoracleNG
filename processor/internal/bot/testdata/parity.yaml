# -----------------------------------------------------------------------------
# /untrack — sub-command per tracking type, each with one "tracking" option
# -----------------------------------------------------------------------------
- name: untrack-pokemon
  description: /untrack pokemon tracking:42 removes pokemon rule UID 42
  command: cmd.untrack
  slash:
    name: untrack
    options:
      pokemon.tracking: "42"
  text: "!untrack id:42"
  expected_tokens: ["id:42"]

# /untrack <non-pokemon> is rerouted to cmd.<subtype> with the "remove"
# keyword + UID, because each per-type command requires the explicit remove
# token to delete (bare "id:N" without it is silently a filter).
- name: untrack-raid
  command: cmd.raid
  slash:
    name: untrack
    options:
      raid.tracking: "43"
  text: "!raid remove id:43"
  expected_tokens: ["remove", "id:43"]

- name: untrack-egg
