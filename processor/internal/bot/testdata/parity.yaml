# Parity fixtures for slash↔text command coverage.
#
# Each entry pins a (slash invocation, text command, expected tokens) triple.
# The parity test runs every fixture through the slash mapper and asserts the
# produced token slice matches expected_tokens (order-insensitive). The
# coverage meta-test asserts every command + option in slash.AllDefinitions
# is exercised by at least one fixture here.
#
# Encoding rules for `slash.options`:
#   foo: value             — flat top-level option
#   sub.opt: value         — sub-command "sub" with child option "opt"
#   sub: _bare             — bare sub-command (no children)
#
# Type inference (YAML native):
#   42  → integer
#   "x" → string
#   true → boolean
#
# Keep one fixture per option (at minimum) so additions to mappers force
# additions here.

# -----------------------------------------------------------------------------
# /version, /tracked, /info — read-only, no options
# -----------------------------------------------------------------------------
- name: version-no-options
  description: /version has no options
  command: cmd.version
  slash:
    name: version
    options: {}
  text: "!version"
  expected_tokens: []

- name: tracked-no-options
  description: /tracked has no options
  command: cmd.tracked
  slash:
    name: tracked
    options: {}
  text: "!tracked"
  expected_tokens: []

- name: info-no-options
  description: /info has no options
  command: cmd.info
  slash:
    name: info
    options: {}
  text: "!info"
  expected_tokens: []

# -----------------------------------------------------------------------------
# /help — optional topic
# -----------------------------------------------------------------------------
- name: help-no-topic
  description: /help with no topic returns empty tokens (general help)
  command: cmd.help
