# -----------------------------------------------------------------------------
# /location — coordinate fast-path. Geocoding case requires BotDeps so the
# parity runner SKIPS this fixture; it remains here so the coverage test
# sees the `place` option as exercised. The /location mapper's own
# unit tests cover both the coordinate and geocoding branches.
# -----------------------------------------------------------------------------
- name: location-coords
  description: /location with explicit coordinates (skipped at parity runtime)
  command: cmd.location
  slash:
    name: location
    options:
      place: "51.28, 1.08"
  text: "!location 51.28,1.08"
  expected_tokens: ["51.28,1.08"]
